# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: deadcheck

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: deadcheck
    main: ./cmd/deadcheck
    binary: deadcheck
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: release
    ids:
      - deadcheck
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - none*

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
